name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase credentials
        run: |
          # Create config file with secrets injected
          cat > config.deploy.js << 'EOF'
          window.CONFIG = {
            FIREBASE_API_KEY: '${{ secrets.FIREBASE_API_KEY }}',
            AI_FUNCTION_URL: '${{ secrets.AI_FUNCTION_URL }}'
          };
          EOF

          # Update index.html to load the config
          node -e "
            const fs = require('fs');
            let html = fs.readFileSync('index.html', 'utf8');
            html = html.replace('<title>', '<script src=\"config.deploy.js\"><\/script>\n<title>');
            fs.writeFileSync('index.html', html);
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
