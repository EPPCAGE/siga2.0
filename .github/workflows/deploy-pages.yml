name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config with secrets
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_API_KEY }}
          AI_URL: ${{ secrets.AI_FUNCTION_URL }}
        run: |
          python3 << 'PYTHON'
          import os
          import json

          firebase_key = os.environ.get('FIREBASE_KEY', '')
          ai_url = os.environ.get('AI_URL', '')

          # Use JSON to safely escape values
          config = f"""window.CONFIG = {json.dumps({
              'FIREBASE_API_KEY': firebase_key,
              'AI_FUNCTION_URL': ai_url
          })};"""

          with open('config.deploy.js', 'w') as f:
              f.write(config)

          print("✓ Config created")
          print(f"Firebase Key set: {bool(firebase_key)}")
          print(f"AI URL set: {bool(ai_url)}")
          PYTHON

      - name: Verify config file
        run: |
          echo "=== Checking config.deploy.js ==="
          ls -lh config.deploy.js || echo "ERROR: File not found!"
          echo ""
          echo "=== File content ==="
          cat config.deploy.js || echo "ERROR: Cannot read file!"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          retention-days: 1

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v2
