name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config with secrets
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_API_KEY }}
          AI_URL: ${{ secrets.AI_FUNCTION_URL }}
        run: |
          python3 -c "
import json
firebase_key = '${{ secrets.FIREBASE_API_KEY }}'
ai_url = '${{ secrets.AI_FUNCTION_URL }}'
config = f'window.CONFIG = {json.dumps({\"FIREBASE_API_KEY\": firebase_key, \"AI_FUNCTION_URL\": ai_url})};'
with open('config.deploy.js', 'w') as f:
    f.write(config)
print('✓ Config created')
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
