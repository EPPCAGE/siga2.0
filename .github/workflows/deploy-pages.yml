name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config with secrets
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_API_KEY }}
          AI_URL: ${{ secrets.AI_FUNCTION_URL }}
        run: |
          cat > config.deploy.js << 'EOF'
          window.CONFIG = {
            FIREBASE_API_KEY: '',
            AI_FUNCTION_URL: ''
          };
          EOF

          # Simple replacement using Python
          python3 << 'PYTHON'
          import os

          firebase_key = os.environ.get('FIREBASE_KEY', '')
          ai_url = os.environ.get('AI_URL', '')

          with open('config.deploy.js', 'w') as f:
              f.write(f"""window.CONFIG = {{
  FIREBASE_API_KEY: '{firebase_key}',
  AI_FUNCTION_URL: '{ai_url}'
}};
""")

          # Add script tag to HTML if not already there
          with open('index.html', 'r') as f:
              html = f.read()

          if 'config.deploy.js' not in html:
              html = html.replace('<head>', '<head>\n  <script src="config.deploy.js"></script>')
              with open('index.html', 'w') as f:
                  f.write(html)

          print("✓ Configuration created")
          PYTHON

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
