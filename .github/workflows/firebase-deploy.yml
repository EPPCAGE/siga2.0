name: Deploy para Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Gerar config.deploy.js com secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          AI_FUNCTION_URL: ${{ secrets.AI_FUNCTION_URL }}
          CHECK_EMAIL_URL: ${{ secrets.CHECK_EMAIL_URL }}
          SET_CLAIMS_URL: ${{ secrets.SET_CLAIMS_URL }}
          REGISTER_USER_URL: ${{ secrets.REGISTER_USER_URL }}
          RESET_LINK_URL: ${{ secrets.RESET_LINK_URL }}
        run: |
          node -e "
            const cfg = {
              FIREBASE_API_KEY: process.env.FIREBASE_API_KEY || '',
              AI_FUNCTION_URL: process.env.AI_FUNCTION_URL || '',
              CHECK_EMAIL_URL: process.env.CHECK_EMAIL_URL || '',
              SET_CLAIMS_URL: process.env.SET_CLAIMS_URL || '',
              REGISTER_USER_URL: process.env.REGISTER_USER_URL || '',
              RESET_LINK_URL: process.env.RESET_LINK_URL || '',
            };
            require('fs').writeFileSync('config/config.deploy.js', 'window.CONFIG = ' + JSON.stringify(cfg) + ';');
          "

      - name: Instalar dependências das Cloud Functions
        run: npm ci --prefix functions

      - name: Deploy das Cloud Functions via gcloud
        # gcloud já vem pré-instalado no ubuntu-latest — não precisa de setup-gcloud.
        # Autentica inline sem definir GOOGLE_APPLICATION_CREDENTIALS para não
        # interferir na action de hosting que vem a seguir.
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/sa.json
          gcloud auth activate-service-account --key-file=/tmp/sa.json --quiet
          rm -f /tmp/sa.json

          PROJECT=gesproc2
          REGION=us-central1
          RUNTIME=nodejs20
          SOURCE=./functions

          deploy_fn() {
            local name=$1; shift
            gcloud functions deploy "$name" \
              --gen2 \
              --region="$REGION" \
              --runtime="$RUNTIME" \
              --source="$SOURCE" \
              --entry-point="$name" \
              --trigger-http \
              --allow-unauthenticated \
              --project="$PROJECT" \
              --quiet \
              "$@"
          }

          deploy_fn checkEmail &
          deploy_fn setUserClaims &
          deploy_fn passwordResetLink &
          deploy_fn registerUser &
          deploy_fn migrateAllUserClaims &
          deploy_fn ai \
            --set-secrets="AZURE_OPENAI_KEY=AZURE_OPENAI_KEY:latest,AZURE_OPENAI_ENDPOINT=AZURE_OPENAI_ENDPOINT:latest,AZURE_OPENAI_DEPLOYMENT=AZURE_OPENAI_DEPLOYMENT:latest" &
          wait

      - name: Deploy para Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@0cbcac4740c2bfb00d632f0b863b57713124eb5a  # v0.9.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: gesproc2
          channelId: live

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f  # v2

      - name: Deploy Firestore Rules via REST API
        run: |
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          PROJECT_ID=gesproc2

          # Publica as regras via Firebase Rules REST API (não chama serviceusage.googleapis.com)
          RULES=$(jq -Rs . < firestore.rules)

          RULESET=$(curl -sf -X POST \
            "https://firebaserules.googleapis.com/v1/projects/${PROJECT_ID}/rulesets" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"source\":{\"files\":[{\"content\":${RULES},\"name\":\"firestore.rules\"}]}}")

          RULESET_NAME=$(echo "$RULESET" | jq -r '.name')
          if [ -z "$RULESET_NAME" ] || [ "$RULESET_NAME" = "null" ]; then
            echo "Erro ao criar ruleset: $RULESET"
            exit 1
          fi
          echo "Ruleset criado: $RULESET_NAME"

          curl -sf -X PATCH \
            "https://firebaserules.googleapis.com/v1/projects/${PROJECT_ID}/releases/cloud.firestore" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"release\":{\"name\":\"projects/${PROJECT_ID}/releases/cloud.firestore\",\"rulesetName\":\"${RULESET_NAME}\"}}"

          echo "Regras do Firestore publicadas com sucesso."
