name: Deploy para Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Gerar config.deploy.js com secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          AI_FUNCTION_URL: ${{ secrets.AI_FUNCTION_URL }}
        run: |
          node -e "
            const cfg = {
              FIREBASE_API_KEY: process.env.FIREBASE_API_KEY || '',
              AI_FUNCTION_URL: process.env.AI_FUNCTION_URL || ''
            };
            require('fs').writeFileSync('config.deploy.js', 'window.CONFIG = ' + JSON.stringify(cfg) + ';');
          "

      - name: Deploy para Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@0cbcac4740c2bfb00d632f0b863b57713124eb5a  # v0.9.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: gesproc2
          channelId: live
